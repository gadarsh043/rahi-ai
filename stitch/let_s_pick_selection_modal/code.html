<div class="flex-1">

<span>•</span>
<span>5k reviews</span>

<!-- Add Custom Place Footer -->
<div class="border-t border-gray-200/50 dark:border-gray-700/50 bg-gray-50/80 dark:bg-[#1f1612]/90 p-6 backdrop-blur-md">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary">add_location_alt</span>
<h3 class="text-base font-bold text-slate-900 dark:text-white">Add Custom Place</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-12 gap-4">
<!-- URL Field -->
<div class="md:col-span-4">
<label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">Place URL</label>
<div class="relative">
<input class="w-full pl-9 pr-4 py-2.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:ring-1 focus:ring-primary focus:border-primary" placeholder="https://maps.google.com/..." type="text"/>
<span class="material-symbols-outlined absolute left-2.5 top-2.5 text-slate-400 text-[18px]">link</span>
</div>
</div>
<!-- Name Field -->
<div class="md:col-span-4">
<label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">Name</label>
<div class="relative">
<input class="w-full pl-9 pr-4 py-2.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:ring-1 focus:ring-primary focus:border-primary" placeholder="e.g. The Salt Lick" type="text"/>
<span class="material-symbols-outlined absolute left-2.5 top-2.5 text-slate-400 text-[18px]">storefront</span>
</div>
</div>
<!-- Label Field -->
<div class="md:col-span-2">
<label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">Label</label>
<div class="relative">
<select class="w-full pl-9 pr-8 py-2.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary appearance-none">
<option>Food</option>
<option>Visit</option>
<option>Stay</option>
</select>
<span class="material-symbols-outlined absolute left-2.5 top-2.5 text-slate-400 text-[18px]">label</span>
<span class="material-symbols-outlined absolute right-2 top-2.5 text-slate-400 pointer-events-none text-[18px]">expand_more</span>
</div>
</div>
<!-- Add Button -->
<div class="md:col-span-2 flex items-end">
<button class="w-full py-2.5 bg-slate-900 dark:bg-slate-700 hover:bg-primary dark:hover:bg-primary text-white text-sm font-medium rounded-lg transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">add</span>

</div>
